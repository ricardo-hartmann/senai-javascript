<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Página de Login</title>
</head>
<body>
    <header>
        <h1>Página de Cadastro</h1>
            <nav>
                <a href="../index.html">Início</a>
                <a href="../index.html">Login</a>
                <a href="cadastro/index.html">Cadastre-se</a>
            </nav>
    </header>

    <main>
        <form action="" id="formCadastro">
            <h1>Cadastre-se</h1>
                <div class="cadastro">
                    <label for="email">Nome</label>
                    <input id="nome" type="text" name="nome" placeholder="Nome Completo">
                </div>

                <div class="cadastro">
                    <label for="email">Email</label>
                    <input id="email" type="email" name="email">
                </div>

                <div class="cadastro">
                    <label for="senha">Senha</label>
                    <input id="senha" type="password" name="senha">
                </div>

                <div class="cadastro">
                    <label for="confirmar">Confirmar Senha</label>
                    <input id="confirma-senha" type="password" name="confirma-senha">
                </div>

                <button type="submit" id="btnCadastrar">Cadastrar</button>
                
                <p>Não possui uma senha? <br><a href="../index.html">FAÇA LOGIN</a></p>
        </form>
    </main>

    <footer>
        <p>&copy 2026 -  Todos os direitos reservados</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
